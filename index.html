<!DOCTYPE html>
<html>
<head>
  <title>Right Click Test</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }
    #box {
      font-size: 25px;
      padding: 20px;
      border: 2px solid black;
      display: inline-block;
    }
  </style>
</head>
<body>

<div id="box">Waiting...</div>

<script>
let box = document.getElementById("box");

// LEFT CLICK
document.addEventListener("click", () => {
  box.innerText = "LEFT CLICK DETECTED";
});

// RIGHT CLICK (BACK BUTTON TRAP)
function setupBackTrap() {
  history.pushState({test:1}, "", "");
}

window.addEventListener("popstate", () => {
  box.innerText = "RIGHT CLICK (BACK) DETECTED";
  
  // re-add trap so it keeps working
  setTimeout(() => {
    history.pushState({test:1}, "", "");
  }, 0);
});

// activate after first touch (important)
document.addEventListener("click", setupBackTrap, { once: true });
document.addEventListener("touchstart", setupBackTrap, { once: true });

</script>

</body>
</html>
